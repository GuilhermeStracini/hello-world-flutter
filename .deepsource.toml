version = 1

test_patterns = [
  "test/**"
]

exclude_patterns = [
  "build/**",
  ".dart_tool/**",
  ".idea/**",
  ".vscode/**",
  "ios/**",
  "android/**",
  "linux/**",
  "macos/**",
  "windows/**",
  "web/**",
  "**/*.g.dart",
  "**/*.freezed.dart",
  "**/*.mocks.dart"
]

[[analyzers]]
name = "dart"

enabled = true

  [analyzers.meta]
  flutter = true

  [analyzers.config]
  # Enforce formatting consistency
  formatter = "dartfmt"

  # Enable static analysis ruleset tuning (optional override)
  # Uses project analysis_options.yaml by default
  # analysis_options = "analysis_options.yaml"


[[analyzers]]
name = "test-coverage"

enabled = true

  [analyzers.meta]
  # Flutter coverage output location
  coverage_file = "coverage/lcov.info"

  # Minimum acceptable coverage threshold (optional but recommended)
  # Adjust as your project matures
  min_coverage = 70
